##
## ci.yml — Continuous integration: dependency audit, unit tests (Vitest),
## and integration tests (Playwright → Quench → Foundry VTT in Docker).
##
## Secrets required in repo Settings → Secrets → Actions:
##   FOUNDRY_LICENSE_KEY  — your 32-char Foundry license key
##   FOUNDRY_ADMIN_KEY    — admin panel password for the Docker container
##   FOUNDRY_USERNAME     — foundryvtt.com account email
##   FOUNDRY_PASSWORD     — foundryvtt.com account password
##   FOUNDRY_RELEASE_URL  — (optional) presigned Foundry zip URL; skips foundryvtt.com login download
##

name: CI

on:
  push:
    branches: [main, dev, party-system, "feature/**"]
  pull_request:
    branches: [main, party-system]
  workflow_dispatch:      # allow manual trigger from the Actions tab

permissions:
  contents: read

env:
  OSV_SCANNER_VERSION: v2.3.8

# ---------------------------------------------------------------------------
# Job 1 — Dependency audit (npm advisory DB + OSV lockfile scan)
# ---------------------------------------------------------------------------
jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high or critical)
        run: npm run audit:ci

      - name: Install OSV-Scanner
        run: |
          curl -sSfL -o osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: OSV-Scanner (lockfile)
        run: osv-scanner --lockfile=package-lock.json

  dependency-review:
    name: Dependency Review (PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

# ---------------------------------------------------------------------------
# Job 2 — Unit tests (fast, no Docker needed)
# ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Generate coverage report
        run: npm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job 3 — Integration tests (Docker + Playwright + Quench)
# ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (Quench in Docker)
    runs-on: ubuntu-latest
    needs: [unit-tests, dependency-audit]

    ## Skip this job on forks (secrets not available to fork PRs)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Write .env for Docker Compose
        run: node scripts/write-ci-env.js
        env:
          FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
          FOUNDRY_ADMIN_KEY:   ${{ secrets.FOUNDRY_ADMIN_KEY }}
          FOUNDRY_USERNAME:    ${{ secrets.FOUNDRY_USERNAME }}
          FOUNDRY_PASSWORD:    ${{ secrets.FOUNDRY_PASSWORD }}
          FOUNDRY_RELEASE_URL: ${{ secrets.FOUNDRY_RELEASE_URL }}

      - name: Start Foundry VTT (Docker)
        run: npm run foundry:up

      - name: Show Foundry container status
        run: docker compose --env-file .env -f docker/compose.test.yml ps -a

      - name: Wait for Foundry to be ready
        run: npm run foundry:wait
        env:
          FOUNDRY_URL:          http://localhost:30000
          FOUNDRY_WAIT_TIMEOUT: "600"

      - name: Bootstrap Foundry (install dnd5e, verify Quench)
        run: npm run foundry:bootstrap
        env:
          FOUNDRY_URL:       http://localhost:30000
          FOUNDRY_ADMIN_KEY: ${{ secrets.FOUNDRY_ADMIN_KEY }}

      - name: Run Quench integration tests
        run: npm run test:integration
        env:
          FOUNDRY_URL:       http://localhost:30000
          FOUNDRY_ADMIN_KEY: ${{ secrets.FOUNDRY_ADMIN_KEY }}
          QUENCH_TIMEOUT_MS: "300000"

      - name: Dump Foundry logs on failure
        if: failure()
        run: docker compose --env-file .env -f docker/compose.test.yml logs --tail=200 foundry || true

      - name: Stop Foundry
        if: always()
        run: npm run foundry:down:clean

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright-traces/
          retention-days: 3
