##
## docker/compose.test.yml — spin up a Foundry VTT v14 instance for
## integration testing.
##
## All paths below are relative to this file (docker/).
## The project root is one level up (../).
##
## ── Design ───────────────────────────────────────────────────────────────────
##
## Ephemeral test container — no named Docker volumes.  Named volumes caused
## repeated EACCES failures on Windows/WSL Docker hosts.  The container runs as
## root (acceptable for local/CI throwaway instances).
##
## To pause without losing container state (license, dnd5e, Quench installs):
##   npm run foundry:stop
##   npm run foundry:start
##
## Full wipe and fresh boot:
##   npm run foundry:reset
##
## ── Prerequisites ─────────────────────────────────────────────────────────────
##
##   1. Copy .env.example (project root) to .env and fill in your credentials.
##
## ── Quick start ──────────────────────────────────────────────────────────────
##
##   npm run foundry:reset        # down:clean + up + tail logs
##   npm run foundry:wait
##   npm run foundry:bootstrap
##   npm run test:integration
##

services:
  foundry:
    image: felddy/foundryvtt:14
    hostname: traveler-foundry-ci

    ## Run as root — avoids volume ownership issues on Windows/WSL Docker.
    ## This is a throwaway local/CI test instance, not a production server.
    user: "0:0"

    environment:
      FOUNDRY_LICENSE_KEY:       "${FOUNDRY_LICENSE_KEY}"
      FOUNDRY_ADMIN_KEY:         "${FOUNDRY_ADMIN_KEY}"
      FOUNDRY_USERNAME:          "${FOUNDRY_USERNAME}"
      FOUNDRY_PASSWORD:          "${FOUNDRY_PASSWORD}"
      FOUNDRY_WORLD:             "traveler-ci"
      CONTAINER_PRESERVE_CONFIG: "true"
      FOUNDRY_RELEASE_CHANNEL:   "stable"
      FOUNDRY_TELEMETRY:         "false"
      FOUNDRY_PROTOCOL:          "4"
      FOUNDRY_NO_BACKUPS:        "true"
      CONTAINER_PATCHES:         "/data/container_patches"

    volumes:
      - ./patches:/data/container_patches:ro
      - ..:/mnt/traveler-module:ro
      - ../tests/world:/mnt/traveler-ci-world

    ports:
      - "30000:30000"

    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:30000/api/status"]
      interval:     10s
      timeout:      5s
      retries:      18
      start_period: 90s
